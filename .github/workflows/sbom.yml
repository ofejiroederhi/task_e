name: Generate SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t webapp:${{ github.sha }} .

      - name: Push image to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag webapp:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/webapp:latest
          docker push ghcr.io/${{ github.repository_owner }}/webapp:latest

  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Generate CycloneDX SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/webapp:latest
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

  sign-and-attest:
    name: Sign Image and Attest SBOM (Sigstore)
    runs-on: ubuntu-latest
    needs: generate-sbom
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/webapp:latest

      - name: Attest SBOM (CycloneDX)
        run: cosign attest --yes --predicate sbom.cdx.json --type cyclonedx ghcr.io/${{ github.repository_owner }}/webapp:latest

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/sbom.yml@refs/(heads/main|pull/.+)$" \
            ghcr.io/${{ github.repository_owner }}/webapp:latest

      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/sbom.yml@refs/(heads/main|pull/.+)$" \
            --type cyclonedx \
            ghcr.io/${{ github.repository_owner }}/webapp:latest

  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs:
      - generate-sbom
      - sign-and-attest
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}

      - name: Scan SBOM for vulnerabilities with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: sbom
          input: sbom.cdx.json
          format: table
          exit-code: '1'
          severity: CRITICAL
